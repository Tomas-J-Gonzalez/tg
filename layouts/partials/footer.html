<footer id="site-footer" class="region flow" role="contentinfo" aria-label="Site footer">
  <nav data-variant="footer" aria-label="Footer navigation" role="navigation">
    {{ $currentPage := . }}
    <div class="footer-nav-container">
      <ul class="cluster" role="menubar">
      {{ range .Site.Menus.footer }}
        {{ $isExternal := or (hasPrefix .URL "http://") (hasPrefix .URL "https://") }}
        <li role="none">
          <a data-variant="naked" {{ if eq $currentPage.RelPermalink .URL }}data-state="active" aria-current="page"{{ end }}
          href="{{.URL}}" {{ if $isExternal }}target="_blank" rel="noopener noreferrer"{{ end }} role="menuitem">{{ .Name }}</a>
        </li>
      {{ end }}
      </ul>
      <span id="scroll-to-top-wrapper" class="scroll-to-top-wrapper" hidden>
        <a href="#top" class="scroll-to-top" data-variant="naked" aria-label="Scroll to top of page">
          <i class="fas fa-arrow-up" aria-hidden="true" role="img" aria-label="Scroll to top"></i>
          <span>Top</span>
        </a>
      </span>
    </div>
  </nav>
  <p>&copy; {{ .Site.Params.author.name }} — <a href="/license">CC BY-NC-SA 4.0</a></p>
</footer>
<script>
(function() {
  var threshold = 1.5;
  var wrapper = document.getElementById('scroll-to-top-wrapper');
  if (wrapper && document.documentElement.scrollHeight > window.innerHeight * threshold) {
    wrapper.removeAttribute('hidden');
  }
})();
</script>
